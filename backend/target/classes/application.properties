# ─── Server ───────────────────────────────────────────────────────────
server.port=8080
spring.application.name=blog-platform

# ─── MySQL DataSource ─────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/blog_platform?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=your_mysql_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ─── JPA / Hibernate ─────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ─── JWT ─────────────────────────────────────────────────────────────
app.jwt.secret=BlogPlatformSuperSecretKey2024!MustBeAtLeast256BitsLongForHS256Algorithm
app.jwt.expiration-ms=86400000
app.jwt.refresh-expiration-ms=604800000

# ─── CORS ─────────────────────────────────────────────────────────────
app.cors.allowed-origins=http://localhost:3000

# ─── File upload (cover images) ──────────────────────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=uploads/images

# ─── Logging ─────────────────────────────────────────────────────────
logging.level.com.blogplatform=DEBUG
logging.level.org.springframework.security=INFO
